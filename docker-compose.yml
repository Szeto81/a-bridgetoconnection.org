services:
  # Note: MariaDB is external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/mariadb
  db:
    # Note: Check the recommend version here: https://docs.nextcloud.com/server/latest/admin_manual/installation/system_requirements.html#server
    image: mariadb:lts
    container_name: nextcloud-compose-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED
    volumes:
      - /home/szeto/Public/program files:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=Kylie24Rocky24#
      - MYSQL_PASSWORD=Kylie0307Rocky#
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=szeto

  # Note: Redis is an external service. You can find more information about the configuration here:
  # https://hub.docker.com/_/redis
  redis:
    image: redis:alpine
    restart: always

  app:
    image: nextcloud
    container_name: nextcloud-compose
    restart: always
    ports:
      - 12000:80
    depends_on:
      - redis
      - db
    volumes:
      - /home/szeto/Public/program files:/home/szeto/Public/program files/index.html
    environment:
      - MYSQL_PASSWORD=Kylie0307Rocky#
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=szeto
      - MYSQL_HOST=db
      #
      - NEXTCLOUD_TRUSTED_DOMAINS=a-bridgetoconnection.org
      - NEXTCLOUD_DEFAULT_PHONE_REGION=CA
